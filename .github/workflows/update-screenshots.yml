name: Update screenshots

on:
  pull_request:
    branches:
      - release
  workflow_dispatch:

env:
  # Remove this when Node 24 becomes default on 2 June 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  screenshots:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Meteor
        uses: actions/cache@v4
        with:
          path: ~/.meteor
          key: meteor-${{ runner.os }}-3.3.2

      - name: Install Meteor
        run: |
          if [ ! -f ~/.meteor/meteor ]; then
            curl "https://install.meteor.com/?release=3.3.2" | sh
          fi
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Install dependencies
        run: meteor npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: |
          meteor run --port 3000 > meteor.log 2>&1 &
          echo $! > meteor.pid

      - name: Wait for app
        run: |
          for i in {1..120}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 200 meteor.log || true
          exit 1

      - name: Capture screenshots
        env:
          SCREENSHOT_BASE_URL: http://127.0.0.1:3000
        run: npm run screenshots:all

      - name: Stop app
        if: always()
        run: |
          if [ -f meteor.pid ]; then
            kill "$(cat meteor.pid)" || true
          fi

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes"
            exit 0
          fi
          git commit -m "chore: update screenshots [skip ci]"
          git push

